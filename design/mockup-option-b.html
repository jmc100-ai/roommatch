<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=390px"/>
<title>Option B</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--surface:#131316;--card:#18181c;--border:rgba(255,255,255,0.07);
  --text:#e8e4dc;--muted:#9a9590;--accent:#c9a96e;--radius:14px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:20px;width:390px}
.label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-left:2px}
.desc{font-size:11px;color:rgba(255,255,255,0.25);margin-bottom:14px;padding-left:2px;line-height:1.5}

/* ── OPTION B: photo stays 16/9, body shrunk — vibe text removed, compact padding ── */
.nbhd-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;display:flex;flex-direction:column;
}
.nbhd-card-photo{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--surface)}
.nbhd-card-credit{font-size:9px;color:rgba(255,255,255,0.35);padding:4px 8px;background:rgba(0,0,0,0.4);text-align:right}
.nbhd-card-body{
  padding:10px 14px 11px;   /* was 13/14/14 — tighter */
  flex:1;display:flex;flex-direction:column;gap:5px
}
.nbhd-card-name{font-size:14px;font-weight:500;color:var(--text)}
/* vibe line REMOVED — saves ~18px */
.nbhd-card-tags{display:flex;flex-wrap:wrap;gap:5px}
.nbhd-card-tag{font-size:10px;padding:3px 8px;border-radius:100px;border:1px solid var(--border);color:var(--muted)}
.nbhd-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:6px}
.nbhd-card-count{font-size:10px;color:var(--muted)}
.nbhd-card-visitor{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);opacity:.8}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="label">Option B — No vibe line, tighter body</div>
<div class="desc">Photo unchanged (16:9). Vibe tagline removed. Body padding tightened. Same tag pills + footer.</div>
<div class="nbhd-card">
  <img class="nbhd-card-photo" src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a?w=700&q=80" alt="Le Marais"/>
  <div class="nbhd-card-credit">Photo by John Doe on Unsplash</div>
  <div class="nbhd-card-body">
    <div class="nbhd-card-name">Le Marais</div>
    <!-- vibe removed -->
    <div class="nbhd-card-tags">
      <span class="nbhd-card-tag">first-timers</span>
      <span class="nbhd-card-tag">walkable</span>
      <span class="nbhd-card-tag">culture</span>
    </div>
    <div class="nbhd-card-footer">
      <span class="nbhd-card-count">142 hotels</span>
      <span class="nbhd-card-visitor">First visit</span>
    </div>
  </div>
</div>
</body>
</html>
