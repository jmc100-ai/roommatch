<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg2" cx="70%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#1a2033"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b27a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d8b27a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg2)"/>

  <!-- Blocks  more organic, off-centre, less uniform -->
  <g fill="#141a28" opacity="0.75">
    <rect x="20"  y="25"  width="90"  height="55"  rx="4"/>
    <rect x="130" y="20"  width="65"  height="70"  rx="4"/>
    <rect x="215" y="30"  width="80"  height="45"  rx="4"/>
    <rect x="310" y="20"  width="70"  height="65"  rx="4"/>
    <rect x="30"  y="100" width="70"  height="60"  rx="4"/>
    <rect x="120" y="110" width="95"  height="45"  rx="4"/>
    <rect x="235" y="95"  width="75"  height="65"  rx="4"/>
    <rect x="325" y="105" width="60"  height="55"  rx="4"/>
    <rect x="25"  y="180" width="65"  height="55"  rx="4"/>
    <rect x="105" y="175" width="80"  height="70"  rx="4"/>
    <rect x="200" y="180" width="60"  height="50"  rx="4"/>
    <rect x="275" y="175" width="105" height="65"  rx="4"/>
  </g>

  <!-- Park / green space (suggests leafy local area) -->
  <g fill="#1b2d24" opacity="0.8">
    <path d="M85 95 Q 100 80 125 90 Q 140 110 120 135 Q 100 150 85 140 Q 70 125 75 110 Z"/>
    <path d="M95 105 q 6 -2 10 4 q 2 4 -4 5 q -6 1 -6 -4 z" fill="#2c4836" opacity="0.6"/>
    <path d="M110 115 q 5 -2 9 3 q 2 4 -3 5 q -5 1 -6 -3 z" fill="#2c4836" opacity="0.6"/>
  </g>

  <!-- Main avenue -->
  <path d="M -10 155 Q 100 170 200 155 T 410 170" stroke="#1f2638" stroke-width="6" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- Subtle grid lines -->
  <g stroke="#1f2638" stroke-width="1" fill="none" opacity="0.7">
    <path d="M0 90 Q 150 95 400 88"/>
    <path d="M0 240 L400 245"/>
    <path d="M115 0 L120 300"/>
    <path d="M270 0 L275 300"/>
  </g>

  <!-- Trendy cluster glow (offset to lower-left, away from city centre) -->
  <circle cx="115" cy="195" r="75" fill="url(#glow2)"/>

  <!-- Hotel dots clustered in a single "trendy local" pocket (lower-left) -->
  <g>
    <circle cx="95"  cy="175" r="4.5" fill="#d8b27a"/>
    <circle cx="115" cy="170" r="5"   fill="#e8c285"/>
    <circle cx="135" cy="180" r="4"   fill="#d8b27a"/>
    <circle cx="105" cy="192" r="5.5" fill="#e8c285"/>
    <circle cx="128" cy="198" r="4.5" fill="#d8b27a"/>
    <circle cx="88"  cy="200" r="4"   fill="#d8b27a"/>
    <circle cx="148" cy="205" r="4"   fill="#d8b27a"/>
    <circle cx="118" cy="215" r="3.5" fill="#c9a36a"/>
    <circle cx="98"  cy="220" r="3.5" fill="#c9a36a"/>
    <circle cx="138" cy="222" r="3"   fill="#c9a36a"/>
  </g>

  <!-- A few scattered dots on the right to show the rest of the city for contrast -->
  <g fill="#5a4e3a" opacity="0.55">
    <circle cx="280" cy="120" r="2.5"/>
    <circle cx="320" cy="150" r="2.5"/>
    <circle cx="250" cy="220" r="2.5"/>
    <circle cx="345" cy="200" r="2.5"/>
  </g>

  <!-- Neighbourhood outline marker -->
  <g transform="translate(115 195)">
    <ellipse rx="55" ry="38" fill="none" stroke="#d8b27a" stroke-width="1.2" opacity="0.35" stroke-dasharray="3 3"/>
  </g>
</svg>
