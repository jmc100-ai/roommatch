<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomMatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c0e;
      --surface:  #131316;
      --card:     #18181c;
      --border:   rgba(255,255,255,0.07);
      --text:     #e8e4dc;
      --muted:    #6b6760;
      --accent:   #c9a96e;
      --accent2:  #e8d5b0;
      --radius:   14px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.4;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      padding: 40px 56px 0;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: var(--accent2);
      text-transform: uppercase;
    }
    .logo-dot { color: var(--accent); }
    .tagline {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Hero ────────────────────────────────────────────────────────────── */
    .hero {
      padding: 52px 56px 40px;
      max-width: 900px;
    }
    .hero-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 4.5vw, 58px);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .hero-heading em { font-style: italic; color: var(--accent); }
    .hero-sub {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 36px;
      letter-spacing: 0.02em;
    }

    /* ── Search form ─────────────────────────────────────────────────────── */
    .search-form { display: flex; flex-direction: column; gap: 12px; max-width: 800px; }

    .input-row { display: grid; grid-template-columns: 1fr 200px; gap: 12px; }

    .field-label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="text"], textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: none;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: rgba(201,169,110,0.4);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.07);
    }
    textarea { min-height: 76px; line-height: 1.6; }
    textarea::placeholder, input::placeholder { color: var(--muted); font-style: italic; }

    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 2px; }
    .chip {
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(201,169,110,0.07); }

    .search-btn {
      align-self: flex-end;
      background: var(--accent);
      color: #0c0c0e;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 13px 28px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-transform: uppercase;
    }
    .search-btn:hover  { background: var(--accent2); }
    .search-btn:active { transform: scale(0.98); }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider { height: 1px; background: var(--border); margin: 0 56px; }

    /* ── Status ──────────────────────────────────────────────────────────── */
    #status {
      padding: 18px 56px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .spinner {
      width: 13px; height: 13px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results: full-width rows ────────────────────────────────────────── */
    #results {
      padding: 0 56px 80px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Hotel row card ──────────────────────────────────────────────────── */
    .hotel-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
      transition: border-color 0.2s;
    }
    .hotel-row:hover { border-color: rgba(201,169,110,0.2); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hotel-row:nth-child(1)  { animation-delay: 0.04s; }
    .hotel-row:nth-child(2)  { animation-delay: 0.08s; }
    .hotel-row:nth-child(3)  { animation-delay: 0.12s; }
    .hotel-row:nth-child(4)  { animation-delay: 0.16s; }
    .hotel-row:nth-child(5)  { animation-delay: 0.20s; }
    .hotel-row:nth-child(6)  { animation-delay: 0.24s; }
    .hotel-row:nth-child(7)  { animation-delay: 0.28s; }
    .hotel-row:nth-child(8)  { animation-delay: 0.32s; }

    /* ── Hotel header ────────────────────────────────────────────────────── */
    .hotel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }
    .hotel-header-left { display: flex; flex-direction: column; gap: 4px; min-width: 0; }

    .hotel-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hotel-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .stars { color: var(--accent); font-size: 11px; letter-spacing: 2px; }
    .hotel-location { font-size: 12px; color: var(--muted); font-weight: 300; }
    .hotel-guest-score {
      font-size: 12px;
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 100px;
      border: 1px solid var(--border);
    }
    .hotel-guest-score strong { color: var(--text); font-weight: 500; }

    .hotel-header-right { flex-shrink: 0; }

    .book-btn {
      display: inline-block;
      padding: 9px 20px;
      border-radius: 8px;
      border: 1px solid rgba(201,169,110,0.3);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .book-btn:hover { background: rgba(201,169,110,0.08); border-color: var(--accent); }

    /* ── Room strip ──────────────────────────────────────────────────────── */
    .room-strip-wrap {
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(201,169,110,0.2) transparent;
    }
    .room-strip-wrap::-webkit-scrollbar { height: 4px; }
    .room-strip-wrap::-webkit-scrollbar-track { background: transparent; }
    .room-strip-wrap::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.2); border-radius: 2px; }

    .room-strip {
      display: flex;
      gap: 2px;
      padding: 0;
      /* Each cell fixed width so they don't shrink */
    }

    /* ── Individual room cell ────────────────────────────────────────────── */
    .room-cell {
      flex: 0 0 220px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      cursor: default;
    }

    .room-cell:first-child { border-radius: 0; }

    .room-img-wrap {
      position: relative;
      width: 100%;
      height: 160px;
      overflow: hidden;
      background: var(--surface);
    }

    .room-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .room-cell:hover .room-img { transform: scale(1.04); }

    .room-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: var(--muted);
    }

    /* Match badge on photo */
    .room-match-badge {
      position: absolute;
      bottom: 8px; left: 8px;
      background: rgba(12,12,14,0.85);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(201,169,110,0.35);
      border-radius: 100px;
      padding: 3px 9px;
      font-size: 10px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    /* Room info below photo */
    .room-info {
      padding: 10px 12px 12px;
      background: var(--card);
      border-top: 1px solid var(--border);
      flex: 1;
    }

    .room-cell-name {
      font-size: 11px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .match-bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .match-bar-track {
      flex: 1;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .match-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
    }
    .match-pct {
      font-size: 10px;
      color: var(--accent);
      font-weight: 500;
      white-space: nowrap;
      min-width: 28px;
      text-align: right;
    }

    /* ── Room count label ────────────────────────────────────────────────── */
    .room-count-label {
      padding: 8px 24px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── Empty / error ───────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }
    .empty-icon  { font-size: 44px; margin-bottom: 16px; opacity: 0.3; }
    .empty-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; color: var(--muted); margin-bottom: 8px; }
    .empty-sub   { font-size: 13px; color: var(--muted); font-weight: 300; }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 18px 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-text { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
    .footer-text a { color: var(--accent); text-decoration: none; }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      header, .hero { padding-left: 20px; padding-right: 20px; }
      .divider, #status, #results, footer { padding-left: 20px; padding-right: 20px; }
      .input-row { grid-template-columns: 1fr; }
      .hero-heading { font-size: 34px; }
      .hotel-header { flex-wrap: wrap; }
      .room-cell { flex: 0 0 180px; }
      .room-img-wrap { height: 130px; }
    }
  </style>
</head>
<body>

  <header>
    <span class="logo">Room<span class="logo-dot">·</span>Match</span>
    <span class="tagline">Visual hotel room search</span>
  </header>

  <section class="hero">
    <h1 class="hero-heading">Find rooms that<br><em>look</em> the way you want</h1>
    <p class="hero-sub">Describe the room you're imagining. We'll show every matching room at each hotel.</p>

    <form class="search-form" onsubmit="handleSearch(event)">
      <div>
        <label class="field-label" for="queryInput">Describe your ideal room</label>
        <textarea
          id="queryInput"
          placeholder="e.g. minimalist bathroom with double sinks and a soaking tub, warm lighting…"
          rows="3"
        ></textarea>
      </div>

      <div class="chips">
        <button type="button" class="chip" onclick="setQuery(this)">Luxury bathroom with soaking tub</button>
        <button type="button" class="chip" onclick="setQuery(this)">Modern suite with city view</button>
        <button type="button" class="chip" onclick="setQuery(this)">Art deco room with warm lighting</button>
        <button type="button" class="chip" onclick="setQuery(this)">Double sinks and walk-in shower</button>
        <button type="button" class="chip" onclick="setQuery(this)">Bright minimalist room with desk</button>
        <button type="button" class="chip" onclick="setQuery(this)">Cozy suite with fireplace</button>
      </div>

      <div class="input-row">
        <div>
          <label class="field-label" for="cityInput">City</label>
          <input type="text" id="cityInput" placeholder="e.g. Paris, New York, Tokyo…" />
        </div>
        <button type="submit" class="search-btn" id="searchBtn">Search rooms</button>
      </div>
    </form>
  </section>

  <div class="divider"></div>
  <div id="status"></div>
  <div id="results"></div>

  <footer>
    <span class="footer-text">Powered by <a href="https://liteapi.travel" target="_blank">LiteAPI</a> room-search</span>
    <span class="footer-text">Rooms ranked by visual similarity score</span>
  </footer>

  <script>
    const BACKEND = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3000'
      : '';

    function setQuery(chip) {
      document.getElementById('queryInput').value = chip.textContent.trim();
      document.getElementById('queryInput').focus();
    }

    function setStatus(msg, loading = false) {
      const el = document.getElementById('status');
      el.innerHTML = loading
        ? `<div class="spinner"></div><span>${msg}</span>`
        : `<span>${msg}</span>`;
    }

    async function handleSearch(e) {
      e.preventDefault();
      const query = document.getElementById('queryInput').value.trim();
      const city  = document.getElementById('cityInput').value.trim();
      if (!query) { alert('Please describe the room you\'re looking for.'); return; }
      if (!city)  { alert('Please enter a city.'); return; }

      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      btn.textContent = 'Searching…';
      setStatus(`Searching for "${query}" in ${city}…`, true);
      document.getElementById('results').innerHTML = '';

      try {
        const resp = await fetch(`${BACKEND}/api/room-search?` + new URLSearchParams({ query, city }));
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Search failed');

        const hotels = data.hotels || [];
        if (hotels.length === 0) {
          setStatus('');
          renderEmpty(query, city);
        } else {
          const totalRooms = hotels.reduce((n, h) => n + (h.rooms?.length || 0), 0);
          setStatus(`${hotels.length} hotels · ${totalRooms} matching rooms in ${city}`);
          renderResults(hotels);
        }
      } catch (err) {
        setStatus('');
        renderError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Search rooms';
      }
    }

    function renderResults(hotels) {
      document.getElementById('results').innerHTML = hotels.map((h, i) => hotelRowHTML(h, i)).join('');
    }

    function hotelRowHTML(h, i) {
      const stars     = '★'.repeat(Math.min(Math.max(Math.round(h.starRating || 0), 0), 5));
      const location  = [h.address, h.city, h.country].filter(Boolean).join(', ') || h.city || '';
      const bookUrl   = `https://www.google.com/search?q=${encodeURIComponent(h.name + ' ' + (h.city || '') + ' hotel booking')}`;
      const ratingStr = h.rating > 0 ? `<strong>${parseFloat(h.rating).toFixed(1)}</strong> guest score` : '';
      const rooms     = h.rooms || [];
      const roomCount = rooms.length;

      const roomCells = rooms.map(r => {
        const img = r.imageUrl
          ? `<img class="room-img" src="${r.imageUrl}" alt="${r.name || 'Room'}" loading="lazy"
                  onerror="this.parentElement.innerHTML='<div class=room-img-placeholder>🛏</div>'">`
          : `<div class="room-img-placeholder">🛏</div>`;

        const badge = r.score
          ? `<div class="room-match-badge">${r.score}%</div>`
          : '';

        const name = r.name
          ? `<div class="room-cell-name" title="${r.name}">${r.name}</div>`
          : '';

        const bar = r.score
          ? `<div class="match-bar-row">
               <div class="match-bar-track">
                 <div class="match-bar-fill" style="width:${r.score}%"></div>
               </div>
               <span class="match-pct">${r.score}%</span>
             </div>`
          : '';

        return `
          <div class="room-cell">
            <div class="room-img-wrap">
              ${img}
              ${badge}
            </div>
            <div class="room-info">
              ${name}
              ${bar}
            </div>
          </div>`;
      }).join('');

      return `
        <div class="hotel-row" style="animation-delay:${i * 0.06}s">
          <div class="hotel-header">
            <div class="hotel-header-left">
              <div class="hotel-name">${h.name}</div>
              <div class="hotel-meta">
                ${stars ? `<span class="stars">${stars}</span>` : ''}
                ${location ? `<span class="hotel-location">${location}</span>` : ''}
                ${ratingStr ? `<span class="hotel-guest-score">${ratingStr}</span>` : ''}
              </div>
            </div>
            <div class="hotel-header-right">
              <a class="book-btn" href="${bookUrl}" target="_blank" rel="noopener">Find &amp; Book →</a>
            </div>
          </div>
          <div class="room-strip-wrap">
            <div class="room-strip">${roomCells}</div>
          </div>
          ${roomCount > 1 ? `<div class="room-count-label">${roomCount} matching rooms</div>` : ''}
        </div>`;
    }

    function renderEmpty(query, city) {
      document.getElementById('results').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <div class="empty-title">No rooms found</div>
          <div class="empty-sub">No rooms matched "${query}" in ${city}.<br>Try a different description or city.</div>
        </div>`;
    }

    function renderError(msg) {
      document.getElementById('results').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <div class="empty-title">Something went wrong</div>
          <div class="empty-sub">${msg}</div>
        </div>`;
    }
  </script>
</body>
</html>
