<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomMatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0c0e;
      --surface: #131316;
      --card:    #18181c;
      --row:     #1c1c21;
      --border:  rgba(255,255,255,0.07);
      --text:    #e8e4dc;
      --muted:   #9a9590;
      --accent:  #c9a96e;
      --accent2: #e8d5b0;
      --green:   #6dba8a;
      --radius:  14px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.4;
    }

    /* ── Header ─────────────────── */
    header { padding: 40px 56px 0; display: flex; align-items: baseline; gap: 16px; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; letter-spacing: 0.14em; color: var(--accent2); text-transform: uppercase; }
    .logo-dot { color: var(--accent); }
    .tagline { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); font-weight: 300; }

    /* ── Logo compact (sticky bar only) ── */
    .logo-compact {
      display: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 300; letter-spacing: 0.14em;
      color: var(--accent2); text-transform: uppercase;
      flex-shrink: 0; white-space: nowrap; line-height: 1;
    }
    .logo-compact .logo-dot { color: var(--accent); }

    /* ── Hero ───────────────────── */
    .hero { padding: 48px 56px 36px; max-width: 900px; }
    .hero-heading { font-family: 'Cormorant Garamond', serif; font-size: clamp(34px, 4vw, 54px); font-weight: 300; line-height: 1.1; margin-bottom: 8px; }
    .hero-heading em { font-style: italic; color: var(--accent); }
    .hero-sub { font-size: 13px; color: var(--muted); font-weight: 300; margin-bottom: 32px; }

    /* ── Form ───────────────────── */
    .search-form { display: flex; flex-direction: column; gap: 12px; max-width: 800px; }
    .input-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; align-items: end; }
    .field-label { display: block; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="date"], textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 300; padding: 13px 16px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; resize: none;
    }
    input:focus, textarea:focus { border-color: rgba(201,169,110,0.4); box-shadow: 0 0 0 3px rgba(201,169,110,0.07); }
    textarea { min-height: 72px; line-height: 1.6; }
    ::placeholder { color: var(--muted); font-style: italic; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.55); cursor: pointer; }
    input[type="date"] { color-scheme: dark; }

    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip { font-size: 11px; padding: 5px 12px; border-radius: 100px; border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.15s; background: transparent; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
    .chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(201,169,110,0.07); }

    .search-btn { background: var(--accent); color: #0c0c0e; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; padding: 13px 24px; cursor: pointer; transition: background 0.2s, transform 0.1s; text-transform: uppercase; white-space: nowrap; }
    .search-btn:hover { background: var(--accent2); }
    .search-btn:active { transform: scale(0.98); }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider { height: 1px; background: var(--border); margin: 0 56px; }

    /* ── City autocomplete ───────────────────────────────────────────────── */
    .city-wrap { position: relative; }
    .city-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 100;
      background: #1e1e24; border: 1px solid rgba(201,169,110,0.25);
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
    }
    .city-dropdown.visible { display: block; }
    .city-option {
      padding: 10px 16px; font-size: 13px; color: var(--text); cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      transition: background 0.1s;
      border-bottom: 1px solid var(--border);
    }
    .city-option:last-child { border-bottom: none; }
    .city-option:hover, .city-option.active { background: rgba(201,169,110,0.08); color: var(--accent); }
    .city-option-icon { font-size: 14px; flex-shrink: 0; opacity: 0.6; }
    .city-option-sub { font-size: 11px; color: var(--muted); margin-left: auto; }
    .city-loading { padding: 12px 16px; font-size: 12px; color: var(--muted); font-style: italic; }

    /* ── Status ─────────────────── */
    #status { padding: 12px 56px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); min-height: 44px; display: flex; align-items: center; gap: 10px; }
    .spinner { width: 13px; height: 13px; border: 1.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Sort bar ────────────────── */
    .sort-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 10px 56px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }
    .sort-group { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .sort-label {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-right: 8px; font-weight: 400;
    }
    .sort-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.15s;
      letter-spacing: 0.03em;
    }
    .sort-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .sort-btn.active {
      background: var(--surface);
      border-color: rgba(201,169,110,0.35);
      color: var(--accent);
    }
    .result-count { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; }

    /* ── Results ────────────────── */
    #results { padding: 0 56px 80px; display: flex; flex-direction: column; gap: 28px; }

    /* ── Hotel card ─────────────── */
    .hotel-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
      transition: border-color 0.2s;
    }
    .hotel-card:hover { border-color: rgba(201,169,110,0.18); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .hotel-card:nth-child(1) { animation-delay:.04s }
    .hotel-card:nth-child(2) { animation-delay:.08s }
    .hotel-card:nth-child(3) { animation-delay:.12s }
    .hotel-card:nth-child(4) { animation-delay:.16s }
    .hotel-card:nth-child(5) { animation-delay:.20s }
    .hotel-card:nth-child(6) { animation-delay:.24s }
    .hotel-card:nth-child(7) { animation-delay:.28s }
    .hotel-card:nth-child(8) { animation-delay:.32s }

    /* ── Hotel header ───────────── */
    .hotel-header {
      padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    }
    .hotel-header-left { min-width: 0; display: flex; flex-direction: column; gap: 5px; flex: 1; }
    .hotel-name-row { display: flex; align-items: center; gap: 14px; min-width: 0; flex-wrap: wrap; }
    .hotel-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .hotel-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .stars { color: var(--accent); font-size: 11px; letter-spacing: 2px; }
    .hotel-location { font-size: 12px; color: var(--muted); font-weight: 300; }
    .hotel-guest-score { font-size: 11px; color: var(--muted); padding: 2px 8px; border-radius: 100px; border: 1px solid var(--border); }
    .hotel-guest-score strong { color: var(--text); font-weight: 500; }
    .book-btn { flex-shrink: 0; display: inline-block; padding: 9px 18px; border-radius: 8px; border: 1px solid rgba(201,169,110,0.3); color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
    .book-btn:hover { background: rgba(201,169,110,0.08); border-color: var(--accent); }

    /* ── Hotel price placeholder ── */
    .hotel-price {
      flex-shrink: 0; text-align: right;
      display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
      padding-top: 2px;
    }
    .price-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 300; color: var(--text);
      letter-spacing: 0.02em; line-height: 1;
    }
    .price-per { font-size: 11px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 300; }
    .price-note { font-size: 10px; color: var(--muted); font-style: italic; letter-spacing: 0.04em; }

    /* ── Room type row ──────────── */
    .room-type-row { border-bottom: 1px solid var(--border); }
    .room-type-row:last-child { border-bottom: none; }

    .room-type-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; gap: 16px;
      background: var(--row); cursor: pointer; user-select: none;
    }
    .room-type-header:hover { background: rgba(255,255,255,0.02); }

    .room-type-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; flex-wrap: wrap; }

    .room-type-name {
      font-size: 13px; font-weight: 400; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0;
    }

    .room-meta-sep { color: var(--muted); font-size: 10px; flex-shrink: 0; }
    .room-type-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .room-size { font-size: 11px; color: #b8b2ac; white-space: nowrap; }
    .room-beds { font-size: 11px; color: #b8b2ac; white-space: nowrap; }

    .score-pill { display: none; }
    .score-dot  { display: none; }

    .chevron { font-size: 10px; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
    .room-type-row.open .chevron { transform: rotate(180deg); }

    /* ── Photo strip ─────────────── */
    .photo-strip-wrap { overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
    .room-type-row.open .photo-strip-wrap { max-height: 240px; }

    .photo-strip {
      display: flex; gap: 3px; padding: 3px 0 0;
      overflow-x: auto; scrollbar-width: thin;
      scrollbar-color: rgba(201,169,110,0.2) transparent;
    }
    .photo-strip::-webkit-scrollbar { height: 3px; }
    .photo-strip::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.2); border-radius: 2px; }

    .room-photo-cell { flex: 0 0 240px; height: 180px; overflow: hidden; position: relative; background: var(--surface); cursor: zoom-in; }
    .room-photo-cell img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
    .room-photo-cell:hover img { transform: scale(1.04); }
    .room-photo-cell .no-photo { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--muted); cursor: default; }
    .room-photo-cell .zoom-hint {
      position: absolute; top: 8px; right: 8px;
      background: rgba(12,12,14,0.7); backdrop-filter: blur(4px);
      border-radius: 50%; width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .room-photo-cell:hover .zoom-hint { opacity: 1; }

    /* ── Lightbox ─────────────── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 9000;
      background: rgba(6,6,8,0.95); backdrop-filter: blur(12px);
      align-items: center; justify-content: center;
    }
    #lightbox.active { display: flex; }
    #lb-img {
      max-width: min(92vw, 1200px); max-height: 82vh;
      object-fit: contain; border-radius: 4px;
      user-select: none; display: block;
    }
    .lb-close {
      position: fixed; top: 18px; right: 22px;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.75); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; z-index: 9001;
    }
    .lb-close:hover { background: rgba(255,255,255,0.16); color: #fff; }
    .lb-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 44px; height: 64px; border-radius: 6px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.65); font-size: 24px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; z-index: 9001;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.14); color: #fff; }
    #lb-prev { left: 14px; }
    #lb-next { right: 14px; }
    .lb-header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 16px 72px 14px;
      display: flex; align-items: center; gap: 10px;
      background: linear-gradient(to bottom, rgba(6,6,8,0.85) 0%, transparent 100%);
      pointer-events: none; z-index: 9001;
    }
    #lb-room-name { color: rgba(255,255,255,0.82); font-size: 13px; letter-spacing: 0.04em; }
    #lb-match-badge {
      padding: 2px 9px; border-radius: 100px;
      background: rgba(12,12,14,0.75); border: 1px solid rgba(109,186,138,0.45);
      color: var(--green); font-size: 10px; font-weight: 500; letter-spacing: 0.06em;
    }
    #lb-counter {
      position: fixed; bottom: 58px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.3); font-size: 11px; pointer-events: none; z-index: 9001;
    }
    .lb-thumbs {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px; max-width: 90vw; overflow-x: auto;
      scrollbar-width: none; z-index: 9001; pointer-events: all;
    }
    .lb-thumbs::-webkit-scrollbar { display: none; }
    .lb-thumb {
      flex: 0 0 48px; height: 34px; object-fit: cover; border-radius: 3px;
      opacity: 0.4; cursor: pointer; transition: opacity 0.2s;
      border: 1px solid transparent;
    }
    .lb-thumb.active { opacity: 1; border-color: var(--accent); }

    .best-badge {
      position: absolute; bottom: 8px; left: 8px;
      background: rgba(12,12,14,0.85); backdrop-filter: blur(6px);
      border: 1px solid rgba(109,186,138,0.4); border-radius: 100px;
      padding: 3px 10px; font-size: 10px; color: var(--green); font-weight: 500;
      letter-spacing: 0.06em; display: flex; align-items: center; gap: 5px;
    }
    .best-badge--browse {
      border-color: rgba(155,150,145,0.3); color: var(--muted);
    }

    /* ── Amenity tags ────────────── */
    .amenity-tags { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 24px 10px; }
    .amenity-tag { font-size: 10px; padding: 2px 8px; border-radius: 100px; border: 1px solid var(--border); color: var(--muted); letter-spacing: 0.04em; }

    /* ── Section divider ─────────── */
    .section-divider {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 4px; flex-wrap: wrap; gap: 4px;
    }
    .section-divider span:first-child {
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); font-weight: 400;
    }
    .section-divider-sub { font-size: 11px; color: #7a7570; }

    /* ── Empty / error ───────────── */
    .empty-state { text-align: center; padding: 80px 20px; }
    .empty-icon  { font-size: 44px; margin-bottom: 16px; opacity: 0.3; }
    .empty-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; color: var(--muted); margin-bottom: 8px; }
    .empty-sub   { font-size: 13px; color: var(--muted); font-weight: 300; }

    /* ── Footer ─────────────────── */
    footer { border-top: 1px solid var(--border); padding: 18px 56px; display: flex; align-items: center; justify-content: space-between; }
    .footer-text { font-size: 11px; color: var(--muted); }
    .footer-text a { color: var(--accent); text-decoration: none; }

    /* ── Mode toggle ─────────────── */
    .mode-toggle {
      display: inline-flex; background: var(--surface);
      border: 1px solid var(--border); border-radius: 100px;
      padding: 4px; gap: 2px; margin-bottom: 28px;
    }
    .mode-btn {
      padding: 9px 20px; border-radius: 100px; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400;
      letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
      transition: all 0.2s; background: transparent; color: var(--muted); position: relative;
    }
    .mode-btn.active { background: var(--accent); color: #0c0c0e; font-weight: 600; box-shadow: 0 2px 8px rgba(201,169,110,0.35); }
    .mode-btn:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .mode-badge {
      display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 100px;
      background: rgba(109,186,138,0.2); color: var(--green); border: 1px solid rgba(109,186,138,0.3);
      margin-left: 5px; vertical-align: middle; letter-spacing: 0.04em; font-weight: 500;
    }
    .mode-btn.active .mode-badge { background: rgba(0,0,0,0.15); color: rgba(12,12,14,0.7); border-color: rgba(0,0,0,0.1); }

    .clip-score-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 100px;
      background: rgba(109,186,138,0.12); border: 1px solid rgba(109,186,138,0.3);
      color: var(--green); font-weight: 500; white-space: nowrap;
    }
    .clip-progress { height: 3px; background: var(--border); margin: 0 56px; }
    .clip-progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), #a8e6c0); border-radius: 2px; transition: width 0.4s ease; width: 0%; }

    /* ── Indexing banner ─────────── */
    .index-banner {
      margin: 0 56px 20px; padding: 12px 20px; border-radius: 10px;
      background: rgba(201,169,110,0.08); border: 1px solid rgba(201,169,110,0.25);
      font-size: 12px; color: var(--accent); display: flex; align-items: center; gap: 10px;
    }
    .index-banner .spinner { width: 12px; height: 12px; flex-shrink: 0; }

    /* ── Has-results: compact sticky search bar ──────────────────────────── */
    body.has-results header { display: none; }

    body.has-results .hero {
      position: sticky; top: 0; z-index: 50;
      max-width: none; width: 100%;
      padding: 10px 56px;
      background: rgba(12,12,14,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }
    body.has-results .logo-compact { display: block; }
    body.has-results .hero-heading,
    body.has-results .hero-sub,
    body.has-results .chips,
    body.has-results .mode-toggle { display: none; }

    body.has-results .search-form {
      flex-direction: row; align-items: center;
      gap: 8px; max-width: none; flex: 1;
    }
    body.has-results .query-field { flex: 2; min-width: 0; }
    body.has-results .field-label { display: none; }
    body.has-results textarea {
      min-height: 0; height: 42px;
      overflow-y: hidden; padding-top: 11px; padding-bottom: 11px; line-height: 20px;
    }
    body.has-results .input-row { display: contents; }
    body.has-results .city-field { flex: 1.2; min-width: 0; }
    body.has-results .date-field { flex: 0 0 128px; }
    body.has-results .date-field input { height: 42px; padding-top: 0; padding-bottom: 0; }
    body.has-results .search-btn { height: 42px; padding: 0 22px; align-self: auto; }
    body.has-results .sort-bar { display: flex; }

    /* ── Mobile ──────────────────── */
    @media (max-width: 640px) {
      header, .hero { padding-left: 20px; padding-right: 20px; }
      .divider, #status, #results, footer, .sort-bar { padding-left: 20px; padding-right: 20px; }
      .input-row { grid-template-columns: 1fr 1fr; }
      .city-field { grid-column: 1 / -1; }
      .search-btn { grid-column: 1 / -1; width: 100%; }
      .hotel-header { flex-wrap: wrap; }
      .hotel-price { flex-direction: row; align-items: baseline; gap: 6px; width: 100%; }
      .room-photo-cell { flex: 0 0 200px; height: 150px; }
      .hotel-name-row { flex-direction: column; align-items: flex-start; gap: 8px; }
      .book-btn { align-self: flex-start; }
      .room-type-header { flex-wrap: nowrap; }
      .index-banner { margin: 0 20px 16px; }
      body.has-results .hero { padding: 10px 20px; }
      body.has-results .date-field { display: none; }
      body.has-results .city-field { flex: 1; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">Room<span class="logo-dot">·</span>Match</span>
  <span class="tagline">Visual hotel room search</span>
</header>

<section class="hero">
  <span class="logo-compact">Room<span class="logo-dot">·</span>Match</span>

  <h1 class="hero-heading">Find rooms that<br><em>look</em> the way you want</h1>
  <p class="hero-sub">Describe your ideal room. We'll show every room type at each matching hotel.</p>

  <div class="mode-toggle">
    <button class="mode-btn" id="modeA" onclick="setMode('liteapi')">LiteAPI Room Search</button>
    <button class="mode-btn active" id="modeB" onclick="setMode('vector')">Vector Search <span class="mode-badge">NEW</span></button>
  </div>

  <form class="search-form" onsubmit="handleSearch(event)">
    <div class="query-field">
      <label class="field-label" for="queryInput">Describe your ideal room</label>
      <textarea id="queryInput" rows="3"
        placeholder="e.g. minimalist bathroom with double sinks and a soaking tub, warm lighting…"></textarea>
    </div>

    <div class="chips">
      <button type="button" class="chip" onclick="setQuery(this)">Luxury bathroom with soaking tub</button>
      <button type="button" class="chip" onclick="setQuery(this)">Modern suite with city view</button>
      <button type="button" class="chip" onclick="setQuery(this)">Art deco room with warm lighting</button>
      <button type="button" class="chip" onclick="setQuery(this)">Double sinks and walk-in shower</button>
      <button type="button" class="chip" onclick="setQuery(this)">Bright minimalist room with desk</button>
      <button type="button" class="chip" onclick="setQuery(this)">Cozy suite with fireplace</button>
    </div>

    <div class="input-row">
      <div class="city-field">
        <label class="field-label" for="cityInput">City</label>
        <div class="city-wrap">
          <input type="text" id="cityInput" placeholder="e.g. Paris, New York, Tokyo…"
                 autocomplete="off" oninput="onCityInput(this.value)" onblur="hideCitySuggestions()" />
          <div class="city-dropdown" id="cityDropdown"></div>
        </div>
      </div>
      <div class="date-field">
        <label class="field-label" for="checkinInput">Check-in</label>
        <input type="date" id="checkinInput" />
      </div>
      <div class="date-field">
        <label class="field-label" for="checkoutInput">Check-out</label>
        <input type="date" id="checkoutInput" />
      </div>
      <button type="submit" class="search-btn" id="searchBtn">Search rooms</button>
    </div>
  </form>
</section>

<div class="divider"></div>
<div class="clip-progress" id="clipProgress" style="display:none"><div class="clip-progress-fill" id="clipProgressFill"></div></div>
<div id="status"></div>
<div id="indexBanner" style="display:none" class="index-banner"></div>

<div class="sort-bar" id="sortBar">
  <div class="sort-group">
    <span class="sort-label">Sort</span>
    <button class="sort-btn active" data-sort="match" onclick="setSortBy('match')">Best Match</button>
    <button class="sort-btn" data-sort="rating" onclick="setSortBy('rating')">Guest Rating</button>
    <button class="sort-btn" data-sort="stars" onclick="setSortBy('stars')">Stars</button>
  </div>
  <span id="resultCount" class="result-count"></span>
</div>

<div id="results"></div>

<footer>
  <span class="footer-text">Powered by <a href="https://liteapi.travel" target="_blank">LiteAPI</a></span>
  <span class="footer-text">Best-match room type highlighted in green</span>
</footer>

<script>
  const BACKEND = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:3000' : '';

  let currentMode = 'vector';
  let clipES = null;
  let clipDone = 0, clipTotal = 10;
  let _lastHotels     = [];
  let _currentSort    = 'match';
  let _displayedCount = 10;

  // Pre-fill dates: tomorrow + tomorrow+2
  (function initDates() {
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    const checkout = new Date(tomorrow);
    checkout.setDate(checkout.getDate() + 2);
    const fmt = d => d.toISOString().slice(0, 10);
    document.getElementById('checkinInput').value  = fmt(tomorrow);
    document.getElementById('checkoutInput').value = fmt(checkout);
  })();

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('modeA').classList.toggle('active', mode === 'liteapi');
    document.getElementById('modeB').classList.toggle('active', mode === 'vector');
    document.getElementById('results').innerHTML = '';
    document.getElementById('sortBar').style.display = 'none';
    document.getElementById('resultCount').textContent = '';
    document.body.classList.remove('has-results');
    _lastHotels     = [];
    _displayedCount = 10;
    hideBanner();
    setStatus('');
  }

  function setQuery(chip) {
    document.getElementById('queryInput').value = chip.textContent.trim();
    document.getElementById('queryInput').focus();
  }

  function setStatus(msg, loading = false) {
    document.getElementById('status').innerHTML = loading
      ? `<div class="spinner"></div><span>${msg}</span>`
      : `<span>${msg}</span>`;
  }

  function toggleRoom(row) {
    row.classList.toggle('open');
  }

  async function handleSearch(e) {
    e.preventDefault();
    const query = document.getElementById('queryInput').value.trim();
    const city  = document.getElementById('cityInput').value.trim();
    if (!query) { alert("Please describe the room you're looking for."); return; }
    if (!city)  { alert('Please enter a city.'); return; }
    if (clipES) { clipES.close(); clipES = null; }
    const btn = document.getElementById('searchBtn');
    btn.disabled = true; btn.textContent = 'Searching…';
    document.getElementById('results').innerHTML = '';
    if (currentMode === 'vector') startVectorSearch(query, city, btn);
    else if (currentMode === 'clip') startClip(query, city, btn);
    else startLiteApi(query, city, btn);
  }

  async function startLiteApi(query, city, btn) {
    setStatus(`Searching for "${query}" in ${city}…`, true);
    try {
      const resp = await fetch(`${BACKEND}/api/room-search?` + new URLSearchParams({ query, city }));
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Search failed');
      const hotels = data.hotels || [];
      if (!hotels.length) { setStatus(''); renderEmpty(query, city); }
      else {
        const totalTypes = hotels.reduce((n, h) => n + (h.roomTypes?.length || 0), 0);
        setStatus(`${hotels.length} hotels · ${totalTypes} room types in ${city}`);
        render(hotels);
      }
    } catch (err) { setStatus(''); renderError(err.message); }
    finally { btn.disabled = false; btn.textContent = 'Search rooms'; }
  }

  async function startVectorSearch(query, city, btn) {
    setStatus(`Searching vector index for "${query}" in ${city}…`, true);
    hideBanner();
    try {
      const resp = await fetch(`${BACKEND}/api/vsearch?` + new URLSearchParams({ query, city }));
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Vector search failed');

      if (data.indexing) {
        showBanner(data.message || `Building visual index for ${city}…`, true);
        setTimeout(() => pollIndexStatus(query, city), 15000);
      }

      const hotels = data.hotels || [];
      if (!hotels.length && !data.indexing) {
        setStatus(''); renderEmpty(query, city);
      } else if (hotels.length) {
        setStatus('');
        render(hotels);
      } else {
        setStatus(`Index building for ${city} — results will appear shortly`, false);
      }
    } catch(err) { setStatus(''); renderError(err.message); }
    finally { btn.disabled = false; btn.textContent = 'Search rooms'; }
  }

  async function pollIndexStatus(query, city) {
    try {
      const r = await fetch(`${BACKEND}/api/index-status?` + new URLSearchParams({ city }));
      const d = await r.json();
      if (d.status === 'complete') {
        hideBanner();
        const btn = document.getElementById('searchBtn');
        btn.disabled = true; btn.textContent = 'Searching…';
        startVectorSearch(query, city, btn);
      } else if (d.status === 'indexing') {
        showBanner(`Indexing ${city}… ${d.hotel_count || 0} hotels processed so far. Auto-refreshing…`, true);
        setTimeout(() => pollIndexStatus(query, city), 15000);
      }
    } catch(e) {}
  }

  function showBanner(msg, loading = false) {
    const b = document.getElementById('indexBanner');
    b.style.display = 'flex';
    b.innerHTML = loading
      ? `<div class="spinner"></div><span>${msg}</span>`
      : `<span>${msg}</span>`;
  }

  function hideBanner() {
    document.getElementById('indexBanner').style.display = 'none';
  }

  function startClip(query, city, btn) {
    setStatus(`Starting CLIP analysis for "${query}" in ${city}…`, true);
    const prog = document.getElementById('clipProgress');
    const fill = document.getElementById('clipProgressFill');
    prog.style.display = 'block'; fill.style.width = '0%';
    clipDone = 0; clipTotal = 10;
    const scored = [];
    clipES = new EventSource(`${BACKEND}/api/clip-search?` + new URLSearchParams({ query, city }));
    clipES.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'status') { setStatus(msg.message, true); }
      else if (msg.type === 'hotel') {
        clipDone++;
        fill.style.width = `${Math.round((clipDone / clipTotal) * 100)}%`;
        scored.push(msg.hotel);
        const sorted = [...scored].sort((a, b) => (b.clipScore||0) - (a.clipScore||0));
        document.getElementById('results').innerHTML = sorted.map(hotelHTML).join('');
        setStatus(`Scored ${clipDone} of ${clipTotal} hotels — ranked by CLIP similarity`);
      }
      else if (msg.type === 'done') {
        clipES.close(); clipES = null;
        btn.disabled = false; btn.textContent = 'Search rooms';
        fill.style.width = '100%';
        setTimeout(() => { prog.style.display = 'none'; }, 800);
        if (!scored.length) { setStatus(''); renderEmpty(query, city); }
        else setStatus(`${scored.length} hotels · ranked by CLIP visual similarity`);
      }
      else if (msg.type === 'error') {
        clipES.close(); clipES = null;
        btn.disabled = false; btn.textContent = 'Search rooms';
        prog.style.display = 'none'; setStatus(''); renderError(msg.message);
      }
    };
    clipES.onerror = () => {
      if (clipES) { clipES.close(); clipES = null; }
      btn.disabled = false; btn.textContent = 'Search rooms';
      prog.style.display = 'none'; setStatus(''); renderError('CLIP search failed');
    };
  }

  // ── Render + sort ──────────────────────────────────────────────────────────

  function render(hotels) {
    _lbRegistry.length = 0;  // reset photo registry for each new search result
    _lastHotels     = hotels;
    _currentSort    = 'match';
    _displayedCount = 10;
    document.body.classList.add('has-results');
    document.querySelectorAll('.sort-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.sort === 'match');
    });
    renderSorted();
  }

  function setSortBy(sort) {
    _currentSort    = sort;
    _displayedCount = 10;
    document.querySelectorAll('.sort-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.sort === sort);
    });
    renderSorted();
  }

  function renderSorted() {
    const hotels = [..._lastHotels];
    if (_currentSort === 'rating') {
      hotels.sort((a, b) => (b.rating || 0) - (a.rating || 0));
    } else if (_currentSort === 'stars') {
      hotels.sort((a, b) => (b.starRating || 0) - (a.starRating || 0));
    }
    // 'match' order is already correct from the server (scored desc, then unscored by rating)

    const toShow    = hotels.slice(0, _displayedCount);
    const remaining = hotels.length - _displayedCount;
    const total     = hotels.length;

    // Update result count in sort bar
    const showing = toShow.length;
    document.getElementById('resultCount').textContent =
      remaining > 0 ? `Showing ${showing} of ${total} hotels` : `${total} hotel${total !== 1 ? 's' : ''}`;

    let html = toShow.map(hotelHTML).join('');

    // Sentinel triggers loading more
    if (remaining > 0) {
      const nextBatch = Math.min(remaining, 10);
      html += `<div id="scroll-sentinel" style="height:48px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px">
        Loading ${nextBatch} more…
      </div>`;
    }

    document.getElementById('results').innerHTML = html;

    if (remaining > 0) {
      const sentinel = document.getElementById('scroll-sentinel');
      const obs = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) {
          obs.disconnect();
          _displayedCount += 10;
          renderSorted();
        }
      }, { rootMargin: '300px' });
      obs.observe(sentinel);
    }
  }

  function hotelHTML(h) {
    const stars    = '★'.repeat(Math.min(Math.max(Math.round(h.starRating || 0), 0), 5));
    const location = [h.address, h.city, h.country].filter(Boolean).join(', ');
    const rating   = h.rating > 0 ? `<span class="hotel-guest-score"><strong>${parseFloat(h.rating).toFixed(1)}</strong> guest score</span>` : '';
    const bookUrl  = `https://www.google.com/search?q=${encodeURIComponent(h.name + ' ' + (h.city||'') + ' hotel booking')}`;
    const clipBadge = h.clipScore > 0 ? `<span class="clip-score-badge">&#9889; ${h.clipScore}% CLIP</span>` : '';
    const roomRows = (h.roomTypes || []).map((rt, ri) => roomTypeHTML(rt, ri === 0, h.vectorScore)).join('');

    return `
      <div class="hotel-card">
        <div class="hotel-header">
          <div class="hotel-header-left">
            <div class="hotel-name-row">
              <div class="hotel-name">${h.name}</div>
              <a class="book-btn" href="${bookUrl}" target="_blank" rel="noopener">Find &amp; Book →</a>
            </div>
            <div class="hotel-meta">
              ${stars ? `<span class="stars">${stars}</span>` : ''}
              ${location ? `<span class="hotel-location">${location}</span>` : ''}
              ${rating}${clipBadge}
            </div>
          </div>
          <div class="hotel-price">
            <span class="price-value">--<span class="price-per">/night</span></span>
            <span class="price-note">Add dates for rates</span>
          </div>
        </div>
        ${roomRows}
      </div>`;
  }

  function roomTypeHTML(rt, isTopMatch, hotelScore) {
    const sizeHTML = rt.size ? `<span class="room-size">${rt.size}</span>` : '';
    const bedsHTML = rt.beds ? `<span class="room-beds">${rt.beds}</span>` : '';

    const photos = rt.photos || [];
    const regKey = _lbRegistry.length;
    _lbRegistry.push({ photos, name: rt.name, score: rt.score });
    const photoHTML = photos.length
      ? photos.slice(0, 10).map((url, pi) => {
          let badge = '';
          if (pi === 0 && isTopMatch) {
            if (rt.score !== null && rt.score > 0) {
              badge = `<div class="best-badge">${rt.score}% match</div>`;
            } else if (hotelScore === 0) {
              badge = `<div class="best-badge best-badge--browse">browse</div>`;
            }
          }
          return `
          <div class="room-photo-cell" onclick="openLightbox(${regKey}, ${pi})">
            <img src="${url}" alt="${rt.name}" loading="lazy"
                 onerror="this.parentElement.innerHTML='<div class=no-photo>🛏</div>'">
            ${badge}
            <div class="zoom-hint">⤢</div>
          </div>`;
        }).join('')
      : `<div class="room-photo-cell"><div class="no-photo">🛏</div></div>`;

    const amenityHTML = rt.amenities?.length
      ? `<div class="amenity-tags">${rt.amenities.map(a => `<span class="amenity-tag">${a}</span>`).join('')}</div>`
      : '';

    const openClass = isTopMatch ? ' open' : '';

    return `
      <div class="room-type-row${openClass}">
        <div class="room-type-header" onclick="toggleRoom(this.parentElement)">
          <div class="room-type-left">
            <span class="room-type-name">${rt.name}</span>
            ${(bedsHTML || sizeHTML) ? '<span class="room-meta-sep">·</span>' : ''}
            <div class="room-type-meta">${bedsHTML}${sizeHTML}</div>
          </div>
          <span class="chevron">▼</span>
        </div>
        <div class="photo-strip-wrap">
          <div class="photo-strip">${photoHTML}</div>
          ${amenityHTML}
        </div>
      </div>`;
  }

  function renderEmpty(query, city) {
    document.body.classList.add('has-results');
    document.getElementById('results').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No rooms found</div>
        <div class="empty-sub">No rooms matched "${query}" in ${city}.<br>Try a different description or city.</div>
      </div>`;
  }

  function renderError(msg) {
    document.body.classList.add('has-results');
    document.getElementById('results').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Something went wrong</div>
        <div class="empty-sub">${msg}</div>
      </div>`;
  }

  // ── City autocomplete ──────────────────────────────────────────────────────
  let cityTimer = null;
  let activeIdx = -1;

  async function onCityInput(val) {
    clearTimeout(cityTimer);
    const dd = document.getElementById('cityDropdown');
    if (val.length < 2) { dd.classList.remove('visible'); dd.innerHTML = ''; return; }

    dd.innerHTML = '<div class="city-loading">Searching…</div>';
    dd.classList.add('visible');
    activeIdx = -1;

    cityTimer = setTimeout(async () => {
      try {
        const resp = await fetch(`${BACKEND}/api/places?q=${encodeURIComponent(val)}`);
        const data = await resp.json();
        const places = data.places || [];
        if (!places.length) {
          dd.innerHTML = '<div class="city-loading">No cities found</div>';
          return;
        }
        dd.innerHTML = places.map((p, i) => {
          const label    = p.name;
          const subParts = [p.state, p.country].filter(Boolean);
          const sub      = subParts.join(', ');
          const safeLabel = label.replace(/'/g, "\\'");
          return `
            <div class="city-option" data-name="${label}" data-idx="${i}"
                 onmousedown="selectCity('${safeLabel}')">
              <span class="city-option-icon">📍</span>
              <span>${label}</span>
              ${sub ? `<span class="city-option-sub">${sub}</span>` : ''}
            </div>`;
        }).join('');
      } catch {
        dd.classList.remove('visible');
      }
    }, 250);
  }

  function selectCity(name) {
    document.getElementById('cityInput').value = name;
    document.getElementById('cityDropdown').classList.remove('visible');
  }

  function hideCitySuggestions() {
    setTimeout(() => {
      document.getElementById('cityDropdown').classList.remove('visible');
    }, 150);
  }

  // Keyboard nav on city input
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('cityInput').addEventListener('keydown', e => {
      const dd = document.getElementById('cityDropdown');
      const opts = dd.querySelectorAll('.city-option');
      if (!opts.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, opts.length - 1);
        opts.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        opts.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
      } else if (e.key === 'Enter' && activeIdx >= 0) {
        e.preventDefault();
        selectCity(opts[activeIdx].dataset.name);
      } else if (e.key === 'Escape') {
        dd.classList.remove('visible');
      }
    });
  });

  // ── Lightbox ──────────────────────────────────────────────────────────────
  const _lbRegistry = [];  // [{photos:[url,...], name:string}] populated per render
  let _lbKey = -1, _lbIdx = 0;

  function openLightbox(regKey, idx) {
    const entry = _lbRegistry[regKey];
    if (!entry || !entry.photos.length) return;
    _lbKey = regKey;
    _lbIdx = idx;
    // Build thumbnail strip
    const thumbsEl = document.getElementById('lb-thumbs');
    thumbsEl.innerHTML = entry.photos.map((url, i) =>
      `<img class="lb-thumb${i === idx ? ' active' : ''}" src="${url}" onclick="lbGoTo(${i})" alt="">`
    ).join('');
    _lbUpdate();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function lbGoTo(idx) {
    _lbIdx = idx;
    _lbUpdate();
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  function lbNav(dir) {
    const entry = _lbRegistry[_lbKey];
    if (!entry) return;
    _lbIdx = (_lbIdx + dir + entry.photos.length) % entry.photos.length;
    _lbUpdate();
  }

  function _lbUpdate() {
    const entry = _lbRegistry[_lbKey];
    if (!entry) return;
    document.getElementById('lb-img').src = entry.photos[_lbIdx];
    document.getElementById('lb-room-name').textContent = entry.name;
    const badge = document.getElementById('lb-match-badge');
    if (entry.score !== null && entry.score > 0) {
      badge.textContent = `${entry.score}% match`;
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
    document.getElementById('lb-counter').textContent = `${_lbIdx + 1} / ${entry.photos.length}`;
    document.querySelectorAll('.lb-thumb').forEach((t, i) => {
      t.classList.toggle('active', i === _lbIdx);
      if (i === _lbIdx) t.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    });
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('active')) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); lbNav(1); }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); lbNav(-1); }
    else if (e.key === 'Escape') closeLightbox();
  });

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target.id === 'lightbox') closeLightbox();
  });
</script>

<!-- Lightbox overlay -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-nav" id="lb-prev" onclick="lbNav(-1)">&#8249;</button>
  <img id="lb-img" src="" alt="" ondragstart="return false">
  <button class="lb-nav" id="lb-next" onclick="lbNav(1)">&#8250;</button>
  <div class="lb-header">
    <div id="lb-room-name"></div>
    <div id="lb-match-badge"></div>
  </div>
  <div id="lb-counter"></div>
  <div class="lb-thumbs" id="lb-thumbs"></div>
</div>
</body>
</html>
