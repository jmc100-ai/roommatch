services:
  - type: web
    name: roommatch-api
    runtime: node
    # Omit devDependencies (@playwright/test is huge — bloated uploads slowed “Uploading build…”)
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: SITE_PUBLIC_ORIGIN
        value: https://www.travelbyvibe.com
      - key: BETA_BASE_URL
        value: https://www.travelbyvibe.com
      - key: LITEAPI_KEY
        sync: false
      - key: NODE_ENV
        value: production
      # Optional: vector search flag behavior (defaults in server.js if unset)
      - key: VSEARCH_FLAG_MODE
        sync: false
      - key: SOFT_FLAG_COVERAGE_MULT
        sync: false
      - key: SOFT_FLAG_MISS_PENALTY
        sync: false
      - key: SOFT_FLAG_HOTEL_CAP
        sync: false
      # Search perf flags (May 2026) — slim JSON stubs, parallel rates, nbhd BOOP L2 cache
      - key: CLIENT_PARALLEL_RATES
        value: "1"
      - key: VSEARCH_SLIM_STUBS
        value: "1"
      - key: NBHD_BOOP_CACHE
        value: "1"
