services:
  - type: web
    name: roommatch-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RAPIDAPI_KEY
        sync: false        # you set this in the Render dashboard
      - key: ANTHROPIC_KEY
        sync: false        # you set this in the Render dashboard
