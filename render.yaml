services:
  - type: web
    name: roommatch-api
    runtime: node
    # Omit devDependencies (@playwright/test is huge — bloated uploads slowed “Uploading build…”)
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: SITE_PUBLIC_ORIGIN
        value: https://www.travelbyvibe.com
      - key: BETA_BASE_URL
        value: https://www.travelbyvibe.com
      - key: LITEAPI_KEY
        sync: false
      - key: NODE_ENV
        value: production
      # Optional: vector search flag behavior (defaults in server.js if unset)
      - key: VSEARCH_FLAG_MODE
        sync: false
      - key: SOFT_FLAG_COVERAGE_MULT
        sync: false
      - key: SOFT_FLAG_MISS_PENALTY
        sync: false
      - key: SOFT_FLAG_HOTEL_CAP
        sync: false
      # Search perf flags (May 2026) — slim JSON stubs, parallel rates, nbhd BOOP L2 cache
      # Append isSandbox=true to Nuitée WL checkout URLs (test card 4242…). Omit on production.
      - key: WL_SANDBOX
        sync: false
      - key: CLIENT_PARALLEL_RATES
        value: "1"
      - key: VSEARCH_SLIM_STUBS
        value: "1"
      - key: VSEARCH_COMPACT_TAIL
        value: "1"
      - key: VSEARCH_FULL_PAYLOAD_LIMIT
        value: "250"
      - key: VSEARCH_DEFERRED_META_CAP
        value: "200"
      - key: RATES_MAIN_CHUNK
        value: "300"
      - key: RATES_MAIN_CONCURRENCY
        value: "10"
      - key: RATES_CACHE_TTL_MS
        value: "1800000"
      - key: VSEARCH_RATES_WAIT_MS
        value: "8000"
      - key: NBHD_BOOP_CACHE
        value: "1"
      # Boop area-fit blend in Best Match / overall % (room vs nbhd_fit_pct). nbhdScene boosts ×1.28 capped at 0.62.
      - key: VSEARCH_NBHD_RANK_WEIGHT
        value: "0.58"
      # Search perf Phase 1–3 (Jun 2026) — bookable-first, snapshot, warm city
      - key: RATES_SNAPSHOT
        value: "1"
      - key: VSEARCH_FULL_RATES_EMBED
        value: "1"
      - key: VSEARCH_BOOKABLE_RANK
        value: "1"
      - key: VSEARCH_BOOKABLE_PAYLOAD
        value: "1"
      - key: V2_WARM_CITY
        value: "1"
      - key: PHASE_A_TTL_MS
        value: "900000"
      - key: VSEARCH_MATCH_BREAKDOWN_TOPN
        value: "25"
      - key: VSEARCH_GZIP
        value: "1"
