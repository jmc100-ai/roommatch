services:
  - type: web
    name: roommatch-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: LITEAPI_KEY
        sync: false
      - key: NODE_ENV
        value: production
      # Optional: vector search flag behavior (defaults in server.js if unset)
      - key: VSEARCH_FLAG_MODE
        sync: false
      - key: SOFT_FLAG_COVERAGE_MULT
        sync: false
      - key: SOFT_FLAG_MISS_PENALTY
        sync: false
      - key: SOFT_FLAG_HOTEL_CAP
        sync: false
