services:
  - type: web
    name: roommatch-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HOTELBEDS_KEY
        sync: false        # from developer.hotelbeds.com dashboard
      - key: HOTELBEDS_SECRET
        sync: false        # from developer.hotelbeds.com dashboard
      - key: GEMINI_KEY
        sync: false        # from aistudio.google.com (free)
      - key: GOOGLE_KEY
        sync: false        # optional — for hotel thumbnails fallback
