services:
  - type: web
    name: roommatch-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RAPIDAPI_KEY
        sync: false        # from rapidapi.com
      - key: GEMINI_KEY
        sync: false        # from aistudio.google.com (free, no credit card)
      - key: ANTHROPIC_KEY
        sync: false        # optional Claude fallback
